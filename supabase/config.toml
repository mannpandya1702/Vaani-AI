# Supabase config for Vaani-AI
# Project region: ap-south-1 (Mumbai) — ABDM HDM ¶7.6 + DPDP s.16 compliant
project_id = "kjhpmoqybqnjpqfqitqr"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["https://vaani.health"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# ─── Edge Functions ─────────────────────────────────────────────
# Functions called by external services (VAPI/Gupshup/Exotel webhooks)
# bypass JWT — they validate WEBHOOK_MASTER_KEY instead.

[functions.vapi-webhook]
verify_jwt = false

[functions.sarvam-stt-bridge]
verify_jwt = false

[functions.sarvam-tts-bridge]
verify_jwt = false

